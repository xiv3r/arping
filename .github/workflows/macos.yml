name: macOS

on:
  push:
    branches: [ "arping-2.x" ]
  pull_request:
    branches: [ "arping-2.x" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: brew install autoconf automake libnet
    - name: bootstrap
      run: ./bootstrap.sh
    - name: configure
      run: |
        export LDFLAGS="-L$(brew --prefix libnet)/lib"
        export CPPFLAGS="-I$(brew --prefix libnet)/include"
        ./configure
    - name: make
      run: make
    - name: test
      run: ./src/arping --help
    - name: ping default gateway
      run: |
        set -ueo pipefail
        netstat -nr
        GW="$(route -n get default | awk '/gateway:/ {print $2}')"
        echo "Pinging $GW"
        ./src/arping -c 1 "$GW"
        ./src/arping -c 1 -vvvvvvv "$GW"
