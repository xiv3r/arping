name: macOS

on:
  push:
    branches: [ "arping-2.x" ]
  pull_request:
    branches: [ "arping-2.x" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v6
    - name: Install dependencies
      run: brew install autoconf automake libnet
    - name: bootstrap
      run: ./bootstrap.sh
    - name: configure
      run: |
        export LDFLAGS="-L$(brew --prefix libnet)/lib"
        export CPPFLAGS="-I$(brew --prefix libnet)/include"
        ./configure
    - name: make
      run: make
    - name: test
      run: ./src/arping --help
    - name: netstat
      run: netstat -nr
    - name: id
      run: id
    - name: sudo id
      run: sudo id
    - name: Find default gateway
      run: |
        GW="$(route -n get default | awk '/gateway:/ {print $2}')"
        echo "ARPING_GW=$GW" >> "$GITHUB_ENV"
    - name: ping default gateway
      run: sudo ./src/arping -c 1 "$ARPING_GW"
    - name: ping default gw verbosely
      run: sudo ./src/arping -c 1 -vvvvvvv "$ARPING_GW"
